name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 后端编译
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend
        run: mvn compile -DskipTests -B

      # 前端构建
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mes-frontend/package-lock.json

      - name: Build Frontend
        working-directory: mes-frontend
        run: |
          npm ci --registry=https://registry.npmmirror.com
          npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker-compose down
            docker-compose up --build -d

      - name: Health Check
        run: |
          sleep 60
          curl -f http://${{ secrets.SERVER_HOST }}:9000/api/auth/login \
            -X POST -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"123456"}' || exit 1