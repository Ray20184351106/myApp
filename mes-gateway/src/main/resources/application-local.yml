# 本地开发环境配置
spring:
  data:
    redis:
      host: localhost
  cloud:
    gateway:
      routes:
        # 认证服务 - 本地直连 (包含用户管理接口)
        # 注意：必须放在 mes-system 前面，因为 /api/system/user/** 比 /api/system/** 更具体
        - id: mes-auth
          uri: http://localhost:9001
          predicates:
            - Path=/api/auth/**,/api/system/user/**
          filters:
            - StripPrefix=1

        # 系统服务 - 本地直连 (排除用户管理)
        - id: mes-system
          uri: http://localhost:9002
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1
