# 本地开发环境配置
spring:
  data:
    redis:
      host: localhost
  cloud:
    gateway:
      routes:
        # 认证服务 - 部门管理（必须放在最前面）
        - id: mes-auth-dept
          uri: http://localhost:9001
          predicates:
            - Path=/api/system/dept/**
          filters:
            - StripPrefix=1

        # 认证服务 - 用户管理
        - id: mes-auth-user
          uri: http://localhost:9001
          predicates:
            - Path=/api/system/user/**
          filters:
            - StripPrefix=1

        # 认证服务 - 角色管理
        - id: mes-auth-role
          uri: http://localhost:9001
          predicates:
            - Path=/api/system/role/**
          filters:
            - StripPrefix=1

        # 认证服务 - 菜单管理
        - id: mes-auth-menu
          uri: http://localhost:9001
          predicates:
            - Path=/api/system/menu/**
          filters:
            - StripPrefix=1

        # 认证服务 - 认证接口
        - id: mes-auth-auth
          uri: http://localhost:9001
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # 系统服务 - 本地直连 (其他系统接口)
        - id: mes-system
          uri: http://localhost:9002
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1
