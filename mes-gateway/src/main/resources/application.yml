server:
  port: 9000

spring:
  application:
    name: mes-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    gateway:
      routes:
        # 认证服务 - 部门管理（必须放在最前面）
        - id: mes-auth-dept
          uri: lb://mes-auth
          predicates:
            - Path=/api/system/dept/**
          filters:
            - StripPrefix=1

        # 认证服务 - 用户管理
        - id: mes-auth-user
          uri: lb://mes-auth
          predicates:
            - Path=/api/system/user/**
          filters:
            - StripPrefix=1

        # 认证服务 - 角色管理
        - id: mes-auth-role
          uri: lb://mes-auth
          predicates:
            - Path=/api/system/role/**
          filters:
            - StripPrefix=1

        # 认证服务 - 菜单管理
        - id: mes-auth-menu
          uri: lb://mes-auth
          predicates:
            - Path=/api/system/menu/**
          filters:
            - StripPrefix=1

        # 认证服务 - 认证接口
        - id: mes-auth-auth
          uri: lb://mes-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # 系统服务 (其他系统接口) - 放在最后
        - id: mes-system
          uri: lb://mes-system
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1
  data:
    redis:
      port: 6379

# 安全配置 - 白名单
ignore:
  whites:
    - /auth/login
    - /auth/register
    - /auth/captcha

# Token 配置
token:
  header: Authorization
  secret: mescloudmescloudmescloudmescloudmescloud
  expireTime: 120
  prefix: "Bearer "

# 日志
logging:
  level:
    com.mes: debug
    org.springframework.cloud.gateway: debug
