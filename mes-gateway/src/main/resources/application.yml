server:
  port: 9000

spring:
  application:
    name: mes-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    gateway:
      routes:
        # 认证服务 (包含用户、角色、菜单管理接口) - 必须放在前面，优先匹配
        - id: mes-auth
          uri: lb://mes-auth
          predicates:
            - Path=/api/auth/**,/api/system/user/**,/api/system/role/**,/api/system/menu/**
          filters:
            - StripPrefix=1

        # 系统服务 (其他系统接口) - 放在后面
        - id: mes-system
          uri: lb://mes-system
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1
  data:
    redis:
      port: 6379

# 安全配置 - 白名单
ignore:
  whites:
    - /auth/login
    - /auth/register
    - /auth/captcha

# Token 配置
token:
  header: Authorization
  secret: mescloudmescloudmescloudmescloudmescloud
  expireTime: 120
  prefix: "Bearer "

# 日志
logging:
  level:
    com.mes: debug
    org.springframework.cloud.gateway: debug
